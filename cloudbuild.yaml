steps:
  # Build and push the container image using Kaniko for layer caching
  - name: 'gcr.io/kaniko-project/executor:latest'
    args:
    - --destination=gcr.io/$PROJECT_ID/nextn-email-sorter:$SHORT_SHA
    - --destination=gcr.io/$PROJECT_ID/nextn-email-sorter:latest
    - --cache=true
    - --cache-ttl=168h
    - --build-arg=COMMIT_SHA=$SHORT_SHA

  # Deploy container image to Cloud Run
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: gcloud
    args:
      - 'run'
      - 'deploy'
      - 'nextn-email-sorter'
      - '--image'
      - 'gcr.io/$PROJECT_ID/nextn-email-sorter:$SHORT_SHA'
      - '--region'
      - 'us-central1'
      - '--platform'
      - 'managed'
      - '--allow-unauthenticated' # Required for Pub/Sub push subscription if not using Auth token

images:
  - 'gcr.io/$PROJECT_ID/nextn-email-sorter:$SHORT_SHA'
  - 'gcr.io/$PROJECT_ID/nextn-email-sorter:latest'

# ADD THIS BLOCK to satisfy the service account logging requirement
options:
  logging: CLOUD_LOGGING_ONLY